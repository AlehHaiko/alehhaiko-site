<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qubts — Read and Watch</title>
  <link rel="stylesheet" href="/qubts/style.css">
</head>
<body>
  <!-- Dimming overlays for the search-focus easter egg. Hidden until the input is focused. -->
  <div class="overlay overlay-1" aria-hidden="true"></div>
  <div class="overlay overlay-2" aria-hidden="true"></div>

  <!-- Top-left flourish. Color blends into the background; reveals faintly when the overlays dim the screen. -->
  <p class="tagline">Life is spectacle, but we believe in reading!</p>

  <main class="hero">
    <span class="parachute" aria-hidden="true">🪂</span>

    <img class="logo" src="/qubts/assets/qubts-logo.svg" alt="Qubts" width="282" height="89">

    <h1 class="headline">Read and Watch.</h1>

    <p class="subtitle"><strong>Qubts</strong> is a magical service that gives you ability to read <a class="yt-link" href="https://www.youtube.com" target="_blank" rel="noopener">YouTube</a> videos <span class="emoji">🤓</span></p>

    <form class="url-bar" onsubmit="return false;">
      <span class="yt-icon" aria-hidden="true">
        <svg width="30" height="21" viewBox="0 0 30 21" xmlns="http://www.w3.org/2000/svg">
          <rect width="30" height="21" rx="6" fill="#FF0000"/>
          <path d="M12 6 L21 10.5 L12 15 Z" fill="#FFFFFF"/>
        </svg>
      </span>
      <input type="text" class="url-input" placeholder="Insert a YouTube video URL here…" aria-label="YouTube video URL">
      <span class="clear-icon" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
          <circle cx="10" cy="10" r="10" fill="#1D1D1F"/>
          <path d="M6.5 6.5 L13.5 13.5 M13.5 6.5 L6.5 13.5" stroke="#FFFFFF" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </span>
      <button type="submit" class="btn-read">Get &amp; Read it</button>
    </form>

    <p class="helper">Copy &amp; Past any YouTube video link and Qubts will bring you the joy of reading.</p>
  </main>

  <script>
    const bar = document.querySelector('.url-bar');
    const input = document.querySelector('.url-input');
    // Dim the screen while the search field is focused (the tagline reveals on top).
    input.addEventListener('focus', () => document.body.classList.add('search-active'));
    input.addEventListener('blur', () => document.body.classList.remove('search-active'));
    // Clicking anywhere on the bar focuses the field.
    bar.addEventListener('mousedown', (e) => { if (e.target !== input) { e.preventDefault(); input.focus(); } });
    document.querySelector('.clear-icon').addEventListener('click', () => { input.value = ''; input.focus(); });
  </script>
</body>
</html>
