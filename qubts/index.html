<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qubts — Read and Watch</title>
  <link rel="stylesheet" href="/qubts/style.css">
</head>
<body>
  <!-- Decorative top-left flourish, faithful to the Sketch design -->
  <p class="tagline">Life is spectacle, but we believe in reading!</p>

  <main class="hero">
    <span class="parachute" aria-hidden="true">🪂</span>

    <img class="logo" src="/qubts/assets/qubts-logo.svg" alt="Qubts" width="282" height="89">

    <h1 class="headline">Read and Watch.</h1>

    <p class="subtitle">Qubts is a magical service that gives you ability to read YouTube videos <span class="emoji">🤓</span></p>

    <form class="url-bar" onsubmit="return false;">
      <span class="yt-icon" aria-hidden="true">
        <svg width="30" height="21" viewBox="0 0 30 21" xmlns="http://www.w3.org/2000/svg">
          <rect width="30" height="21" rx="6" fill="#FF0000"/>
          <path d="M12 6 L21 10.5 L12 15 Z" fill="#FFFFFF"/>
        </svg>
      </span>
      <input type="text" class="url-input" placeholder="Insert a YouTube video URL here…" aria-label="YouTube video URL">
      <span class="clear-icon" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
          <circle cx="10" cy="10" r="10" fill="#CBC9D7"/>
          <path d="M6.5 6.5 L13.5 13.5 M13.5 6.5 L6.5 13.5" stroke="#FFFFFF" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </span>
      <button type="submit" class="btn-read">Get &amp; Read it</button>
    </form>

    <p class="helper">Copy &amp; Past any YouTube video link and Qubts will bring you the joy of reading.</p>
  </main>
</body>
</html>
